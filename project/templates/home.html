{% extends "base.html" %}

{# documentation: https://jinja.palletsprojects.com/en/stable/templates/ #}

{% set active_page = 'home' %}

{% block title %}Home{% endblock %}

{% block css %}
<!-- Preload Bootstrap Icons -->
<link rel="preload" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" as="style">

<!-- Load CSS -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
<style>
    /* Show light logo by default, hide dark logo */
    .logo-light {
        display: inline-block;
    }
    .logo-dark {
        display: none;
    }

    /* In dark mode, hide light logo and show dark logo */
    @media (prefers-color-scheme: dark) {
        .logo-light {
            display: none;
        }
        .logo-dark {
            display: inline-block;
        }
    }
</style>
{% endblock %}

{% block content %}
<!-- Hero Section -->
<div class="hero-section">
    <h1 class="display-6">placeholder</h1>
    <p class="lead">placeholder</p>
</div>

<!-- Problem Statement -->
<section id="placeholder" class="section-card">
    <h2 class="section-title">Placeholder</h2>
    <p>
        Placeholder
    </p>
    <a href="{{ url_for('blueprint.home') }}" class="btn btn-outline-primary btn-sm mt-2">placeholder <i class="bi bi-arrow-right"></i></a>
</section>

{% endblock %}
